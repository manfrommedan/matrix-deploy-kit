services:
  expire-bot:
    build: .
    container_name: expire-bot
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      # Required — fill in your values
      - EXPIRE_BOT_HOMESERVER=https://matrix.example.com
      - EXPIRE_BOT_USER=@expire-bot:example.com
      - EXPIRE_BOT_PASSWORD=changeme
      # Optional
      # - EXPIRE_BOT_TOKEN=syt_...
      # - EXPIRE_BOT_DEFAULT_RETENTION=24h
      # - EXPIRE_BOT_INTERVAL=60
      # - EXPIRE_BOT_MAX_REDACTS=500
      # - EXPIRE_BOT_COMMAND_COOLDOWN=5
      # - EXPIRE_BOT_PREFIX=!expire
      # - EXPIRE_BOT_LOG_LEVEL=INFO
      # - EXPIRE_BOT_AVATAR=/data/avatar.png
      # - EXPIRE_BOT_NOTIFY_CLEANUP=true
    # networks:
    #   - matrix
    # Uncomment if your homeserver is on a docker network:
    # networks:
    #   matrix:
    #     external: true
