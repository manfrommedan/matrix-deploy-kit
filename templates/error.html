<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Down the rabbit hole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .glitch {
            font-size: 8rem;
            font-weight: 900;
            color: #00ff41;
            text-shadow:
                0 0 10px #00ff41,
                0 0 40px #00ff4180,
                0 0 80px #00ff4140;
            animation: flicker 3s infinite;
            letter-spacing: 0.3em;
        }

        .skull {
            font-size: 4rem;
            margin: 1.5rem 0;
            filter: drop-shadow(0 0 15px #00ff41);
            animation: pulse 2s ease-in-out infinite;
        }

        .message {
            font-size: 1.1rem;
            color: #00ff41;
            opacity: 0;
            animation: typewriter 2s steps(40) 0.5s forwards;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #00ff41;
            display: inline-block;
            max-width: 100%;
        }

        .submessage {
            font-size: 0.85rem;
            color: #00ff4180;
            margin-top: 2rem;
            opacity: 0;
            animation: fadein 1s 3s forwards;
        }

        .prompt {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #00ff4150;
            opacity: 0;
            animation: fadein 1s 4s forwards;
        }

        .prompt span {
            animation: blink 1s step-end infinite;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.8; transform: translateX(-2px); }
            97% { opacity: 1; transform: translateX(2px); }
            98% { opacity: 0.6; transform: translateX(-1px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes typewriter {
            from { width: 0; opacity: 1; }
            to { width: 100%; opacity: 1; }
        }

        @keyframes fadein {
            to { opacity: 1; }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .glitch { font-size: 5rem; }
            .skull { font-size: 3rem; }
            .message { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <canvas class="matrix-rain" id="rain"></canvas>

    <div class="container">
        <div class="glitch">502</div>
        <div class="skull">&#9760;</div>
        <div class="message">The machine sleeps. It will rise again.</div>
        <div class="submessage">// connection to upstream failed</div>
        <div class="prompt">root@void:~$ attempting reconnect...<span>_</span></div>
    </div>

    <script>
        const canvas = document.getElementById('rain');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
