<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matrix Server</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0c0c0e;
  --bg-secondary: #141416;
  --bg-card: rgba(255,255,255,.035);
  --bg-card-hover: rgba(255,255,255,.06);
  --border: rgba(255,255,255,.07);
  --border-hover: rgba(255,255,255,.14);
  --text-primary: #f0f0f2;
  --text-secondary: #8b8b96;
  --text-tertiary: #55555e;
  --accent: #1ed760;
  --accent-muted: rgba(30,215,96,.12);
  --accent-glow: rgba(30,215,96,.06);
  --gradient-start: rgba(30,215,96,.08);
  --gradient-end: rgba(99,102,241,.05);
}

[data-theme="light"] {
  --bg-primary: #fafafb;
  --bg-secondary: #f0f0f2;
  --bg-card: rgba(0,0,0,.025);
  --bg-card-hover: rgba(0,0,0,.05);
  --border: rgba(0,0,0,.07);
  --border-hover: rgba(0,0,0,.14);
  --text-primary: #111113;
  --text-secondary: #6b6b76;
  --text-tertiary: #9b9ba6;
  --accent: #15a648;
  --accent-muted: rgba(21,166,72,.08);
  --accent-glow: rgba(21,166,72,.04);
  --gradient-start: rgba(21,166,72,.06);
  --gradient-end: rgba(99,102,241,.03);
}

*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  min-height:100%;
  background:var(--bg-primary);
  color:var(--text-primary);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center;
  transition:background .5s ease,color .3s ease;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Gradient mesh background */
.mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.mesh::before{
  content:'';position:absolute;
  width:800px;height:800px;
  top:-20%;left:-10%;
  background:radial-gradient(circle,var(--gradient-start) 0%,transparent 70%);
  animation:float 25s ease-in-out infinite;
}
.mesh::after{
  content:'';position:absolute;
  width:600px;height:600px;
  bottom:-15%;right:-5%;
  background:radial-gradient(circle,var(--gradient-end) 0%,transparent 70%);
  animation:float 20s ease-in-out infinite reverse;
}
@keyframes float{
  0%,100%{transform:translate(0,0)}
  25%{transform:translate(60px,-40px)}
  50%{transform:translate(-30px,50px)}
  75%{transform:translate(40px,-20px)}
}

/* Subtle grid pattern */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:80px 80px;
  opacity:.3;
  mask-image:radial-gradient(ellipse at center,black 20%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse at center,black 20%,transparent 70%);
}

/* Main container */
.main{
  position:relative;z-index:1;
  text-align:center;
  padding:2rem;
  width:100%;max-width:400px;
  animation:enter .7s cubic-bezier(.16,1,.3,1);
}
@keyframes enter{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}

/* Logo */
.logo{
  display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;
  margin-bottom:2rem;
  position:relative;
}
.logo-icon{
  width:64px;height:64px;
  position:relative;z-index:1;
}
.logo-glow{
  position:absolute;inset:0;
  background:radial-gradient(circle,var(--accent-muted) 0%,transparent 70%);
  border-radius:50%;
  animation:glow-pulse 4s ease-in-out infinite;
}
@keyframes glow-pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

/* Typography */
.title{
  font-size:1.75rem;
  font-weight:700;
  letter-spacing:-.03em;
  line-height:1.2;
  margin-bottom:.5rem;
}
.subtitle{
  font-size:.8rem;
  font-weight:500;
  color:var(--text-tertiary);
  letter-spacing:.2em;
  text-transform:uppercase;
  margin-bottom:2.5rem;
}

/* Status badge */
.status{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:100px;
  font-size:.78rem;
  font-weight:500;
  color:var(--text-secondary);
  margin-bottom:2.5rem;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.status-dot{
  width:7px;height:7px;
  background:var(--accent);
  border-radius:50%;
  box-shadow:0 0 10px var(--accent-muted);
  position:relative;
}
.status-dot::after{
  content:'';position:absolute;inset:-3px;
  border:1px solid var(--accent);
  border-radius:50%;
  opacity:.3;
  animation:ping 2s cubic-bezier(0,0,.2,1) infinite;
}
@keyframes ping{0%{transform:scale(1);opacity:.3}75%,100%{transform:scale(2);opacity:0}}

/* Navigation links */
.nav{display:flex;flex-direction:column;gap:8px}
.nav a{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:14px;
  text-decoration:none;
  color:var(--text-primary);
  font-size:.88rem;
  font-weight:500;
  transition:all .25s ease;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.nav a:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,.12);
}
.nav-label{display:flex;align-items:center;gap:10px}
.nav-icon{
  width:18px;height:18px;
  color:var(--text-tertiary);
  flex-shrink:0;
}
.nav a:hover .nav-icon{color:var(--accent)}
.nav-arrow{
  color:var(--text-tertiary);
  font-size:.75rem;
  transition:transform .25s ease,color .25s ease;
}
.nav a:hover .nav-arrow{
  transform:translateX(4px);
  color:var(--accent);
}

/* Theme toggle */
.theme-btn{
  position:fixed;top:24px;right:24px;z-index:10;
  width:42px;height:42px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;
  color:var(--text-tertiary);
}
.theme-btn:hover{border-color:var(--border-hover);color:var(--text-primary)}
.theme-btn svg{width:16px;height:16px;transition:transform .3s ease}
.theme-btn:hover svg{transform:rotate(30deg)}

/* Footer */
.footer{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:.7rem;font-weight:500;
  color:var(--text-tertiary);
  letter-spacing:.05em;z-index:1;
  white-space:nowrap;
}

/* Mobile */
@media(max-width:480px){
  .main{padding:1.5rem;max-width:100%}
  .title{font-size:1.5rem}
  .logo{width:68px;height:68px;margin-bottom:1.5rem}
  .logo-icon{width:52px;height:52px}
  .theme-btn{top:16px;right:16px;width:38px;height:38px}
  .footer{bottom:16px}
}
</style>
</head>
<body>

<div class="mesh"></div>
<div class="grid-bg"></div>

<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
</button>

<div class="main">

  <!-- Matrix [M] logo -->
  <div class="logo">
    <div class="logo-glow"></div>
    <svg class="logo-icon" viewBox="0 0 64 64" fill="none">
      <!-- Outer brackets -->
      <path d="M8 8v48h6" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M56 8v48h-6" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 8h6" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M56 8h-6" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- M letterform -->
      <path d="M20 46V18l8 14 4-7 4 7 8-14v28" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>
      <!-- Inner glow dot -->
      <circle cx="32" cy="32" r="2" fill="var(--accent)" opacity=".25"/>
    </svg>
  </div>

  <!-- Replace SERVER_NAME with your server name -->
  <h1 class="title">Matrix Server</h1>
  <p class="subtitle">Private Node</p>

  <div class="status">
    <span class="status-dot"></span>
    All systems operational
  </div>

  <nav class="nav">
    <a href="https://element.SERVER_DOMAIN/">
      <span class="nav-label">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Element Web
      </span>
      <span class="nav-arrow">&rarr;</span>
    </a>
    <a href="tos.html">
      <span class="nav-label">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Terms of Service
      </span>
      <span class="nav-arrow">&rarr;</span>
    </a>
  </nav>

</div>

<div class="footer">Powered by Matrix</div>

<script>
(function(){
  const html=document.documentElement;
  const saved=localStorage.getItem('theme');
  if(saved)html.setAttribute('data-theme',saved);
  updateIcons();

  window.toggleTheme=function(){
    const current=html.getAttribute('data-theme');
    const isDark=!current?!matchMedia('(prefers-color-scheme:light)').matches:current==='dark';
    const next=isDark?'light':'dark';
    html.setAttribute('data-theme',next);
    localStorage.setItem('theme',next);
    updateIcons();
  };

  function updateIcons(){
    const theme=html.getAttribute('data-theme')||
      (matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
    document.querySelector('.sun-icon').style.display=theme==='dark'?'block':'none';
    document.querySelector('.moon-icon').style.display=theme==='light'?'block':'none';
  }
})();
</script>
</body>
</html>
