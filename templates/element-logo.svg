<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)" transform="translate(70, 70) scale(2.2)">
    <!-- Outer shield -->
    <path d="M0 -24 L22 -15 L22 6 C22 19 12 26 0 29 C-12 26 -22 19 -22 6 L-22 -15 Z"
          fill="rgba(0,255,65,0.05)" stroke="#00ff41" stroke-width="1.8" opacity="0.9"/>

    <!-- All-seeing eye -->
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="none" stroke="#00ff41" stroke-width="1.6" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#00ff41" stroke-width="1.4" opacity="0.85"/>
    <circle cx="0" cy="0" r="2" fill="#00ff41" opacity="1"/>

    <!-- Red slash -->
    <line x1="-15" y1="-14" x2="15" y2="16" stroke="#ff0040" stroke-width="2.8" opacity="0.8" stroke-linecap="round"/>
  </g>
</svg>
